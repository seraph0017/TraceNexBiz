# golangci-lint v1.59 配置（W0 scaffold）。
# bola-scope-required 自定义 analyzer 占位：W1a 实现，按 backend §7.4。

run:
  timeout: 5m
  go: "1.22"

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: error-strings
      - name: unused-parameter
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, revive]
    # TODO(W1a): 启用 bola-scope-required 自定义 analyzer，
    # 校验 repository 层每个公共方法签名首参 = (ctx, partnerID|customerID, ...)。
    - path: internal/repository/
      text: "bola-scope-required"
